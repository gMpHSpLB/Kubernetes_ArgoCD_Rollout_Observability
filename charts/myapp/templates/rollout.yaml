# - A rollout.yaml that is rendered only when Rollouts are enabled.
# - This mirrors your existing Deployment spec but wraps it in a Rollout
#   with canary steps and optional Prometheus‑backed analysis.
{{- if .Values.useArgoRollouts }}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "myapp.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "myapp.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "myapp.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "myapp.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
{{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: myapp
          securityContext:
{{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{- if .Values.image.fullName -}}{{ tpl .Values.image.fullName . }}{{- else -}}{{ .Values.image.repository }}:{{ .Values.image.tag }}{{- end -}}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: {{ include "myapp.fullname" . }}-config
            - secretRef:
                name: {{ .Values.secret.name }}
          env:
          {{- range .Values.extraEnv }}
            - name: {{ .name }}
              value: {{ .value | quote }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            successThreshold: 1
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            successThreshold: 1
            failureThreshold: 3
          resources:
{{- toYaml .Values.resources | nindent 12 }}
  strategy:
    canary:
      steps:
      {{- range .Values.rollouts.canary.steps }}
        - {{- toYaml . | nindent 10 }}
      {{- end }}
      {{- if .Values.rollouts.analysis.enabled }}
      analysis:
        templates:
          - templateName: {{ .Values.rollouts.analysis.templateName }}
      {{- end }}
{{- end }}
