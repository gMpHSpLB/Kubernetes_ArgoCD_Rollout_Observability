# This file is a Helm template that generates a Kubernetes
# Deployment for your app. In simple terms, it tells
# Kubernetes how to run your application pods, how many
# copies to keep running, what image to use, what environment
# variables to inject, and how to check whether the app is
# healthy.
#
# What this file is for
#   charts/myapp/templates/deployment.yaml is not a plain
#   Kubernetes YAML file; it is a templated manifest used by
#   Helm to render environment-specific Kubernetes resources
#   at install or upgrade time.
#   Helm replaces values like {{ .Values.image.tag }} and
#   {{ .Release.Name }} with real data from your chart values
#   and release name.
#
# The real use case is to avoid writing separate static YAML
# files for dev, staging, and production. Instead, you keep
# one reusable template and change only the values, such as
# replica count, image tag, secrets, or resource limits.
#
# Why Deployments matter
#   A Deployment is one of the most important Kubernetes objects
#   because it keeps the desired number of Pods running and helps
#   with updates and recovery. If a Pod crashes, Kubernetes
#   replaces it; if you scale replicas up or down, the Deployment
#   controller adjusts accordingly.
#
#   It also supports rolling updates, so you can deploy a new
#   image version gradually instead of stopping the old version
#   all at once.
#
# A typical flow is:
#   build a Docker image, push it to a registry,
#   then run Helm to deploy this template with the correct values
#   into a Kubernetes cluster.
#
# One important detail
#   This file depends on other Helm chart files such as
#   values.yaml, _helpers.tpl, and likely a ConfigMap and
#   Secret template. So the Deployment file is only one
#   piece of the overall chart; it works together with the
#   rest of the chart to produce the final Kubernetes manifests.
#
# Add Rollout template alongside Deployment
#   We’ll keep it for useArgoRollouts=false and
#   add a rollout.yaml that is rendered only when Rollouts are enabled.
{{- if not .Values.useArgoRollouts }}
apiVersion: apps/v1
kind: Deployment # define the Kubernetes resource type as a Deployment, which manages a replicated application workload.
metadata:
  name: {{ include "myapp.fullname" . }} # so the generated Deployment name is consistent and unique for the Helm release.
  labels: # labels and selector.matchLabels must match so Kubernetes knows which Pods belong to this Deployment
    app.kubernetes.io/name: {{ include "myapp.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }} # sets how many Pod copies should run.
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "myapp.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template: # defines the Pod spec that the Deployment will create.
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "myapp.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
{{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers: # defines the application container, including image, port, environment variables, probes, and resource settings.
        - name: myapp
          securityContext:
{{- toYaml .Values.securityContext | nindent 12 }}
          # If image.fullName is non‑empty, use it, allowing CI to pass exactly ghcr.io/$REPO_LOWER/myapp:dev.
          # Otherwise, fall back to repository:tag for local/manual use
          image: "{{- if .Values.image.fullName -}}{{ tpl .Values.image.fullName . }}{{- else -}}{{ .Values.image.repository }}:{{ .Values.image.tag }}{{- end -}}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
              name: http
          envFrom: # loads all key-value pairs from a ConfigMap and a Secret, which is a common way to separate configuration and sensitive data from the application image.
            - configMapRef:
                name: {{ include "myapp.fullname" . }}-config
            - secretRef:
                name: {{ .Values.secret.name }}
          env: #  lets you add extra environment variables dynamically from Helm values.
          {{- range .Values.extraEnv }}
            - name: {{ .name }}
              value: {{ .value | quote }}
          {{- end }}
          readinessProbe: # checks /readyz  so Kubernetes can avoid sending traffic to an unready pod and restart a stuck one
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            successThreshold: 1
            failureThreshold: 2
          livenessProbe: # checks /healthz  so Kubernetes can avoid sending traffic to an unready pod and restart a stuck one
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            successThreshold: 1
            failureThreshold: 3
          resources: #  Resource requests/limits from values.yaml
{{- toYaml .Values.resources | nindent 12 }}
{{- end }}
