# This file is a Helm template for a Kubernetes Secret, and its main purpose is to define the Secret object structure in Git while keeping the actual secret values out of the chart source code. In practice, it lets your app expect certain secret keys to exist, while the real base64-encoded values are injected later by CI, a deployment pipeline, or kubectl create secret.
# Why this file exists
# This file exists to separate secret shape from secret content. The chart defines which secret keys the application expects, but the sensitive values are supplied later so they do not live in the repository.
# That is useful because Helm charts are often committed to Git and shared across environments, while passwords, tokens, and API keys should not be stored in plain text in version control.
# Why use Helm for this
# Helm helps you keep Kubernetes manifests reusable and environment-aware, so the same chart can deploy to dev, staging, and prod with different secret names or key sets. This is especially helpful when different environments have different credentials, or when the secret is managed externally by a pipeline or secret manager.
# Important note
# Your snippet is slightly unusual because data normally must contain base64 values, not empty strings. If the goal is only to declare keys without values, many teams instead:
#     - use stringData during creation, or
#     - omit the Secret template entirely and reference an externally created Secret.
# So the real intention of this file is usually one of these:
#     - generate a Secret template from Helm values,
#     - standardize the required secret keys,
#     - or document the secret contract for the application.
apiVersion: v1
kind: Secret # tell Kubernetes this manifest creates a Secret resource.
metadata: # makes the Secret name configurable from Helm values instead of hardcoding it
  name: {{ .Values.secret.name }}
type: Opaque # means it is a generic Secret, the most common type for arbitrary key-value secret data
# data: is the section where Kubernetes expects secret entries, 
#       and values here must be base64-encoded.
# range .Values.secret.keys loops over a list of keys from values.yaml, so the chart can generate 
#                           the same Secret structure for different apps or environments.
# {{ .name }}: "" is just a placeholder in your snippet; in a real rendered Secret, the 
#                 key should have a base64 value, because Kubernetes Secret data entries are not meant to be empty strings.
#
# You can keep this template or even omit data: entirely and create the 
# Secret outside Helm; the key is that the Deployment will reference this 
# Secret by name.
# data: 
#   {{- range .Values.secret.keys }}
#   {{ .name }}: ""  # actual base64 values supplied externally
#   {{- end }}
# Using stringData is convenient because Kubernetes converts it to base64-encoded data automatically.
stringData:
  DB_HOST: {{ .Values.secret.DB_HOST | quote }}
  DB_PORT: {{ .Values.secret.DB_PORT | quote }}
  DB_NAME: {{ .Values.secret.DB_NAME | quote }}
  DB_USER: {{ .Values.secret.DB_USER | quote }}
  DB_PASSWORD: {{ .Values.secret.DB_PASSWORD | quote }}
  UPTRACE_TOKEN: {{ .Values.secret.UPTRACE_TOKEN | quote }}
  UPTRACE_DSN: {{ .Values.secret.UPTRACE_DSN | quote }}