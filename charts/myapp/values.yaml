# This file is the default configuration for a Helm chart 
# that deploys your app to Kubernetes. It does not run t
# the app by itself; instead, Helm uses these values to 
# fill in templates and generate the actual Kubernetes 
# manifests during install or upgrade.
#
# What this file does
#   values.yaml provides settings that the chart templates 
#   read through .Values. In practice, it lets you change 
#   things like replica count, container image, service 
#   type, resource limits, and environment variables without 
#   editing the template files themselves.
# Real use case
#   A common use case is deploying the same app to multiple
#   environments: dev, staging, and production. You keep the 
#   Kubernetes templates the same, but override values.yaml 
#   per environment so dev can use replicaCount: 1, a dev image tag, and a local tracing endpoint, while production can use more replicas, stricter resource limits, and real secret values.
#
# How Helm uses it
#   When you run Helm install or upgrade, Helm reads this 
#   file as the base configuration and injects the values 
#   into templates like deployment.yaml, service.yaml, 
#   ConfigMap templates, and Secret references. You can 
#   override parts of it with another values file or 
#   with --set on the command line, which is how teams 
#   keep one chart reusable across environments.
#
#Simple example
#   If the deployment template says something like 
#   replicas: {{ .Values.replicaCount }}, then changing 
#   replicaCount from 1 to 3 in values.yaml will make 
#   Kubernetes deploy three pods instead of one. The same 
#   idea applies to image tags, resource limits, and environment 
#   variables.
#
# Note: Helm requires a base values.yaml in the chart; 
# your environments/dev/values-myapp.yaml and the staging/prod 
# files are overrides layered on top of it, not replacements.
replicaCount: 1 # means the app should run as one pod by default.

# Note: 
# you can avoid hard‑coding the repo path in your Helm 
# values by using tpl + Values so CI can inject the full image 
# name (or repo + tag)
image: # control which container image Kubernetes should run and how it should pull it.
  # If fullName is set, it overrides repository:tag
  fullName: ""      # e.g. ghcr.io/owner/repo/myapp:dev
  repository: ""    # optional fallback for local dev
  tag: ""
  pullPolicy: IfNotPresent

service:
  type: ClusterIP #  means the app is exposed only inside the cluster, not directly outside it.
  port: 8000 # is the port the service listens on and forwards to the app.

resources: # sets CPU and memory requests/limits so Kubernetes knows how much capacity the app needs and what maximum it may use
  limits:
    cpu: "500m"
    memory: "512Mi"
  requests:
    cpu: "250m"
    memory: "256Mi"

# Non-secret config; becomes a ConfigMap
# contains non-sensitive environment variables, 
# which are typically turned into a ConfigMap.
config:
  APP_ENV: "dev"
  LOG_LEVEL: "info"
  OTEL_ENABLED: "true"
  OTEL_SERVICE_NAME: "myapp-dev"
  OTEL_EXPORTER_OTLP_ENDPOINT: "api.uptrace.dev:4317"
  DISABLE_CUSTOM_MIDDLEWARE: "false"
  OTEL_TRACES_SAMPLER : "always_on"

# Secret keys; values are provided via external Secret in cluster
# defines the names of secret-backed environment variables that 
# should come from a Kubernetes Secret, not from plain text in the chart
secret:
  name: myapp-secret
  managedByHelm: false        # <--- key flag, means “do not render a Secret; assume it already exists in the cluster.”
  # The other fields are just documentation / defaults; they won’t be used when managedByHelm is false.
  DB_HOST: mydb-postgres # Postgres chart creates a Service named mydb-postgres on port 5432
  DB_PORT: "5432"
  DB_NAME: mydb
  DB_USER: myuser
  DB_PASSWORD: mypassword
  UPTRACE_TOKEN: ""            # override per env / via dev/stage/prod
  UPTRACE_DSN: ""

# Optional extra env vars (non-secret) for experiments
# is a place to add optional environment variables later, usually for testing or experiments.
extraEnv: []

# add pod Non-root security Context
# These enforce non-root and limited capabilities at runtime, matching hardened container guidelines.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001      # must match UID in your myapp Dockerfile
  runAsGroup: 10001
  fsGroup: 10001

# add container Non-root security Context
# These enforce non-root and limited capabilities at runtime, matching hardened container guidelines.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
serviceMonitor:
  enabled: true
  
metrics:
  enabled: true

# Argo Rollouts (an enhanced Kubernetes controller that provides advanced deployment strategies such as Canary and BlueGreen).

# The top-level flag useArgoRollouts: false toggles whether the chart should deploy Rollout objects (Argo Rollouts) instead of plain Deployments.

# The rollouts: block configures a canary rollout strategy and analysis for Argo Rollouts:

#     strategy: canary — choose the canary strategy.

#     canary.steps — a series of incremental traffic-weight changes and pauses:
            # setWeight: 10 — send 10% of traffic to the new replica set.
            # pause duration: 120 — wait 120 seconds.
            # setWeight: 25 — raise to 25% traffic.
            # pause 120s.
            # setWeight: 50 — raise to 50%.
            # pause 120s.
            # setWeight: 100 — route all traffic to the new version.
      # analysis.enabled: true — enable automated analysis during the canary.
      # analysis.templateName: myapp-canary-analysis — refer to an Argo Rollouts AnalysisTemplate named myapp-canary-analysis to run metrics checks or webhooks at analysis points.

# Typical use case

    # Safe progressive delivery / canary releases: gradually shift traffic to a new application version while validating health and metrics to reduce blast radius from bad changes.

    # Automated verification: Argo Rollouts analysis allows you to abort or promote the canary based on metrics (errors, latency, custom Prometheus queries, webhooks).

    # Environments: useful in staging and production to control risk; in development teams you might still use it for realistic testing of release mechanics.

# How to enable for dev / staging / prod
# You need three pieces:

    # Chart templates that render either a Deployment or an Argo Rollout depending on useArgoRollouts.

    # Argo Rollouts controller installed in the cluster.

    # An AnalysisTemplate (myapp-canary-analysis) present in the cluster or created by the chart.

# Steps to implement and enable per environment

# Chart templating (example approach)

    # Your Helm templates should conditionally render either:

        # a Kubernetes Deployment when .Values.useArgoRollouts is false, or

        # an Argo Rollouts Rollout resource when true, using .Values.rollouts.* for strategy and analysis.

# Example logic (pseudocode for templates):

      # if .Values.useArgoRollouts

      # render rollout.yaml with .spec.strategy.canary.steps from .Values.rollouts.canary.steps and .spec.analysis from .Values.rollouts.analysis

      # else

      # render standard deployment.yaml

# Install Argo Rollouts controller

  # Cluster-level: install Argo Rollouts (kubectl/Helm):

      # kubectl create namespace argo-rollouts

      # kubectl apply -n argo-rollouts -f https://github.com/argoproj/argo-rollouts/releases/latest/download/install.yaml

  # Confirm controller running: kubectl get pods -n argo-rollouts

# Provide the AnalysisTemplate

  # Create an AnalysisTemplate named myapp-canary-analysis that defines metrics to check (Prometheus queries, webhooks, or Kubernetes checks) and success/failure criteria.

  # Example minimal AnalysisTemplate (concept):

        # metrics: Prometheus query for error rate < threshold, latency < threshold

        # failure/success conditions

  # You can ship this template with your chart (templates/analysis-template.yaml) or manage it separately via GitOps (ArgoCD).

# Enable per environment

  # Use environment-specific values files (values-dev.yaml, values-staging.yaml, values-prod.yaml) or override values in your CI/CD:

      # For dev: maybe keep useArgoRollouts: false (faster iteration), or enable a very short canary (smaller pauses).

      # For staging: enable Argo Rollouts to validate the process with smaller traffic weights and possibly fewer pauses.

      # For prod: enable Argo Rollouts with full analysis, longer pauses and production-grade AnalysisTemplate (Prometheus metrics, SLO-based thresholds).

  # Example values (values-staging.yaml):

    # useArgoRollouts: true

    # rollouts:
      # strategy: canary
      # canary:
      # steps:

          # setWeight: 10

          # pause: { duration: 60 }

          # setWeight: 50

          # pause: { duration: 120 }

          # setWeight: 100
          # analysis:
          # enabled: true
          # templateName: myapp-canary-analysis

# Deploy with Helm / GitOps

    # Helm CLI: helm upgrade --install myapp ./charts/myapp -f values-prod.yaml

    # GitOps (ArgoCD): commit the chosen values file or Kustomize overlay per environment. Ensure ArgoCD has permissions and target cluster has Argo Rollouts installed.

# Practical tips

    # Test AnalysisTemplate locally in staging before enabling it in prod.

    # Use Prometheus queries in analysis that return numeric values and clear pass/fail criteria.

    # Keep pause durations reasonable; long pauses increase time-to-release.

    # Use small initial setWeight in production to reduce blast radius.

    # Monitor Rollout status: kubectl argo rollouts get rollout <name> --watch (requires argo-rollouts kubectl plugin).

    # If you need traffic routing, ensure your Ingress/Service mesh (Istio, Linkerd) or Service configuration supports weight-based routing. Argo Rollouts can shift traffic using Service selectors for simple cases, or integrate with service meshes via plugins.
useArgoRollouts: false

rollouts:
  strategy: canary
  canary:
    steps:
      - setWeight: 10
      - pause:
          duration: 120
      - setWeight: 25
      - pause:
          duration: 120
      - setWeight: 50
      - pause:
          duration: 120
      - setWeight: 100
  analysis:
    enabled: true
    templateName: myapp-canary-analysis