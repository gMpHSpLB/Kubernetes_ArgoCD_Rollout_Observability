# This version aligns better with current Loki production 
# guidance: object storage, modern schema, and stronger HA 
# settings. It also avoids embedding secrets directly in the 
# Helm values file, which is important because credentials 
# should come from Secrets, ExternalSecrets, or cloud identity 
# mechanisms rather than plaintext values. Using separate buckets 
# for chunks, ruler, and admin is also a cleaner production 
# pattern than dumping everything into one bucket
loki:
  auth_enabled: true  # Keep auth on in production.
  commonConfig:
    replication_factor: 3  # Run at least 3 replicas for HA.

  # S3-backed storage; secrets via env vars (see extraEnv below)
  storage:
    type: s3  # Use object storage for durability and scale.
    bucketNames:
      chunks: my-loki-chunks-prod  # Separate bucket names are preferred in production.
      ruler: my-loki-ruler-prod
      admin: my-loki-admin-prod
    s3:
      region: us-east-1  # Region of the bucket.
      endpoint: s3.amazonaws.com  # AWS endpoint; use your provider endpoint for GCS-compatible/S3-compatible stores.
      s3ForcePathStyle: false  # AWS S3 usually uses virtual-hosted style.
      insecure: false  # Keep TLS on.
      accessKeyId: "${AWS_ACCESS_KEY_ID}"  # Prefer IRSA/Workload Identity or env injection; do not hardcode secrets here.
      secretAccessKey: "${AWS_SECRET_ACCESS_KEY}"  # Prefer secrets/external secrets instead.
      signatureVersion: v4  # Standard for AWS S3.

  schemaConfig:
    configs:
      - from: "2024-04-01"  # Use a recent date for the new production schema.
        store: tsdb  # Preferred modern Loki store for production.
        object_store: s3  # Use S3/GCS-backed object storage.
        schema: v13  # Recommended newer schema.
        index:
          prefix: loki_index_prod_  # Index prefix for TSDB schema.
          period: 24h  # Daily index rotation.

  storage_config:
    aws:
      region: us-east-1  # Used by Loki internals for AWS access.
      s3forcepathstyle: false  # Keep consistent with S3 provider behavior.

  compactor:
    retention_enabled: true  # Enable retention cleanup.
    retention_delete_delay: 12h  # Wait before deleting expired data.
    retention_interval: 10m  # Run retention checks regularly.

  limits_config:
    retention_period: 30d  # Example production retention; tune to your needs.
    allow_structured_metadata: true  # Useful for modern logging pipelines.
    volume_enabled: true  # Enable log volume queries if you use them.

  # Enable env expansion in Loki config
  extraArgs:
    - -config.expand-env=true

  # Your Loki values file should reference the secret through environment variables, not plaintext values. 
  # The pod gets the env vars from the Secret, and Loki expands them at runtime
  # Inject AWS creds from the Kubernetes Secret as env vars
  # extraEnv reads from loki-s3-credentials Secret, and Loki 
  # expands ${AWS_ACCESS_KEY_ID} and ${AWS_SECRET_ACCESS_KEY} at startup
  extraEnv:
    - name: AWS_ACCESS_KEY_ID
      valueFrom:
        secretKeyRef:
          name: loki-s3-credentials-prod
          key: AWS_ACCESS_KEY_ID
    - name: AWS_SECRET_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: loki-s3-credentials-prod
          key: AWS_SECRET_ACCESS_KEY

  ruler:
    storage:
      type: s3  # Store ruler rules in S3 as well.
    enable_api: true  # Common in production if you use alerting rules.

promtail:
  enabled: true  # Keep log shipping enabled.
  resources:
    requests:
      cpu: "100m"  # Reasonable baseline for production.
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
# Pointing Grafana at http://loki.logging.svc:3100 can work 
# if Grafana is in the same cluster and namespace routing is 
# correct, but in production I’d usually prefer the service 
# DNS name that matches your actual deployment and, if applicable, 
# a gateway/service in front of Loki. If Grafana is installed via 
# kube-prometheus-stack, the datasource should also be managed 
# there so you don’t duplicate configuration.
grafana:
  enabled: false  # If Grafana comes from kube-prometheus-stack, disable bundled Grafana here.
