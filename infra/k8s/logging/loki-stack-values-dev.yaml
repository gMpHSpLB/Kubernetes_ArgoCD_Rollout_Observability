global:
  environment: dev

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2020-10-24"
        store: boltdb-shipper
        object_store: filesystem
        schema: v11
        index:
          prefix: index_
          period: 24h
  compactor:
    retention_enabled: true
    delete_request_store: filesystem
    retention_delete_delay: 2h
    retention_interval: 5m
  limits_config:
    retention_period: 7d

grafana:
  enabled: false  # IMPORTANT: no Grafana from loki-stack

promtail:
  enabled: true
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"
  config:
    clients:
      - url: http://myapp-logging-dev-loki.logging.svc:3100/loki/api/v1/push

