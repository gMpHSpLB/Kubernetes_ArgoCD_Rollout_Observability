# for production, do not put AWS keys directly in the Helm values file. The best practice is to store them in a Kubernetes Secret only if you must, but ideally use IRSA / IAM roles for service accounts on EKS, or External Secrets Operator to sync from AWS Secrets Manager or SSM Parameter Store into Kubernetes Secrets.
#
# What you should use
# Best option: IRSA / IAM role
# If this is on EKS, the cleanest setup is to give the Loki service account an IAM role with permission to read/write the bucket. In that case, you do not need to create accessKeyId and secretAccessKey at all, because Loki uses the pod’s IAM identity automatically.
#
# Good option: External Secrets Operator
# If you want to manage secrets centrally in AWS, use AWS Secrets Manager or SSM Parameter Store, then sync them into Kubernetes with External Secrets Operator. ESO creates a normal Kubernetes Secret, and your Helm chart can reference that Secret without storing credentials in git.
#
# Simple option: Kubernetes Secret
# If you are not using IRSA or ESO yet, you can create a Kubernetes Secret manually and mount it as environment variables or reference it from the Helm release. This is acceptable for internal environments, but it is weaker than IRSA for production.
# Note:
# this manifest as documentation, we have kept one file per env, 
# but we still don’t apply them directly; Make overwrites them.
# do not have to keep this file if you create the Secret entirely 
# from the Makefile, but it is nice as documentation.
apiVersion: v1
kind: Secret
metadata:
  name: loki-s3-credentials-prod
  namespace: logging
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""