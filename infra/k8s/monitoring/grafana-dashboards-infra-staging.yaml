apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-infra-staging # must match dashboardsConfigMaps.infra from infra/k8s/monitoring/kube-prometheus-stack-values-prod.yaml
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
# Each key (home.json, k8s-overview.json) is a dashboard 
# file. Value is raw JSON (minified or compact is fine).
data:
  home.json: |
    {
      "id": null,
      "uid": "home-infra",
      "title": "Infra Home",
      "tags": ["infra"],
      "timezone": "browser",
      "schemaVersion": 36,
      "version": 1,
      "panels": []
    }
  k8s-overview.json: |
    {
      "id": null,
      "uid": "k8s-overview",
      "title": "Kubernetes Overview",
      "tags": ["infra","kubernetes"],
      "timezone": "browser",
      "schemaVersion": 36,
      "version": 1,
      "panels": []
    }