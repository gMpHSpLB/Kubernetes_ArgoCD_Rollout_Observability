---
global:
  environment: dev
  
crds:
  enabled: false
prometheusOperator:
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
prometheus:
  image: prom/prometheus:v2.54.0
  storage:
    size: 10Gi
  storageClassName: standard
  prometheusSpec:
    resources:
      requests:
        cpu: "200m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "1Gi"
    retention: 15d
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    scrapeInterval: "15s"
alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"
grafana:
  security:
    adminUserSecret: cluster-monitoring-infra-dev-grafana
    adminUserKey: admin-user
    adminPasswordKey: admin-password
  image: grafana/grafana:11.0.0
  storage:
    size: 5Gi
  storageClassName: standard
  service:
    type: ClusterIP
  domain: grafana-dev.local         # host for Grafana Ingress
  ingress:
    enabled: true
    className: nginx                # matches your myapp Ingress
    tls:
      enabled: false                # dev: no TLS yet; prod will enable
      secretName: grafana-dev-tls   # placeholder for future
      
  database:
    type: sqlite3                    # dev: use SQLite with PVC
    # prod/staging can override to postgres/mysql later via their values files
  rbac:
    create: true
    pspEnabled: false
  grafana.ini:
    auth:
      disable_login_form: false
    users:
      viewers_can_edit: true
    dashboards:
      default_home_dashboard_path: /var/lib/grafana/dashboards/home.json
    security:
      allow_embedding: true
  enabled: true
  additionalDataSources:
    - name: Loki
      type: loki
      uid: loki
      access: proxy
      url: http://myapp-logging-dev-loki.logging.svc:3100
      isDefault: false
      jsonData:
        maxLines: 1000
        timeout: 60
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: infra-dev
          orgId: 1
          folder: infra-dev
          type: file
          options:
            path: /var/lib/grafana/dashboards/infra
        - name: myapp-dev
          orgId: 1
          folder: myapp-dev
          type: file
          options:
            path: /var/lib/grafana/dashboards/myapp
  dashboardsConfigMaps:
    infra: grafana-dashboards-infra-dev
    myapp: grafana-dashboards-myapp-dev