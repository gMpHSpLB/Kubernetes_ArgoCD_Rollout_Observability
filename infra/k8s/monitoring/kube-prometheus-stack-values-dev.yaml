# This YAML is a Helm values file for the 
# kube-prometheus-stack chart, used to deploy and 
# tune a full Kubernetes monitoring stack: Prometheus, 
# Alertmanager, Grafana, and the Prometheus Operator. 
# It is meant for a dev environment baseline, where you 
# want useful monitoring with modest resource usage, and 
# then tighter controls in staging or production.
#
# What it does
# kube-prometheus-stack bundles the standard Kubernetes 
# monitoring pieces into one installable stack, including 
# Prometheus, Grafana, Alertmanager, and the operator that 
# manages Kubernetes monitoring CRDs like ServiceMonitor, 
# PodMonitor, and PrometheusRule.
#
# The main use case is:
#   - collect metrics from your cluster and apps,
#   - store them in Prometheus,
#   - visualize them in Grafana,
#   - and send alerts through Alertmanager.
#
# This file customizes that stack for development by 
# setting resource limits, retention, scrape frequency, 
# and Grafana access settings
#
# This section configures the Prometheus Operator, the controller 
# that watches Kubernetes resources and turns them into monitoring 
# configuration automatically.
# Use case: keep the operator lightweight in dev while preventing 
# it from consuming too much node capacity.
#
# Why this is useful
# This file gives you a repeatable monitoring baseline for a 
# dev cluster. It makes monitoring part of your infrastructure code, 
# so you can version it in Git, review changes, and apply the same 
# setup consistently.
#
# It is also a good starting point for environment-specific tuning:
# dev: lower resources, shorter retention, simple credentials.
# staging: tighter alerting, stronger auth, perhaps longer retention.
# prod: stronger secrets handling, ingress/TLS, higher resource limits, 
# better selectors and alert routing.
#
# Practical example
# If your app exposes a /metrics endpoint and you create a ServiceMonitor, 
# Prometheus will discover it, scrape it every 15 seconds, store the samples 
# for 15 days, and you can build dashboards in Grafana and alerts in Alertmanager 
# from the same data.
# A common dev workflow is: deploy this stack, expose your app metrics, verify 
# Prometheus targets are healthy, import a dashboard in Grafana, and then test 
# one alert rule to confirm Alertmanager works.
global:
  environment: dev
crds:
  enabled: false
prometheusOperator:
  resources: #  defines how much CPU and memory the operator can use.
    requests: # the minimum guaranteed resources Kubernetes reserves for it.
      cpu: "100m" # means 0.1 CPU core. Minimum CPU reserved for the operator controller.
      memory: "256Mi" # means 256 mebibytes. Minimum memory reserved for reconciliation loops.
    limits: # the maximum the pod is allowed to use.
      cpu: "500m" # means up to 0.5 CPU core. Hard cap to prevent noisy-neighbor impact on the node.
      memory: "512Mi" # means up to 512 mebibytes. Prevents the operator from growing unbounded.

# Use case: ensure Prometheus has enough headroom to scrape 
# your cluster without being starved, but still stays bounded 
# in dev.
# This section configures the main Prometheus server, which 
# scrapes and stores metrics.
prometheus:
  prometheusSpec: # settings for the actual Prometheus instance.
    resources:
      requests: # reserves enough resources for normal scraping and query load.
        cpu: "200m" # Baseline CPU for scraping, TSDB housekeeping, and queries.
        memory: "512Mi" # Baseline memory for short-term dev monitoring workloads.
      limits: # caps usage.
        cpu: "1000m" #  allows up to 1 full CPU core. Max one full CPU core in dev
        memory: "1Gi" # allows up to 1 GiB of RAM. Enough for moderate dev scraping volume.
    # Use case: enough history for debugging trends in dev, while keeping storage cost and disk usage reasonable.
    retention: 15d # Keeps metrics for 15 days. Older data is automatically removed.
    # These control how Prometheus selects monitoring resources:
    # In practice, this means Prometheus will not rely only on Helm’s default 
    # selector behavior; it will use explicit selector behavior 
    # from your release configuration instead. This is important 
    # when you want Prometheus to discover ServiceMonitor, PodMonitor, 
    # and PrometheusRule objects reliably across your monitoring setup.
    # Use case: avoid confusion where monitors or rules exist but Prometheus 
    # does not pick them up because selector behavior is too restrictive 
    # or implicit.
    serviceMonitorSelectorNilUsesHelmValues: false # Avoid relying on implicit Helm selector defaults.
    podMonitorSelectorNilUsesHelmValues: false # Explicit monitor discovery behavior.
    ruleSelectorNilUsesHelmValues: false # Explicit rule discovery behavior.
    # Use case: good for dev, because you get more granular 
    # metrics and faster feedback when debugging. 
    # In production, teams sometimes choose a longer interval 
    # to reduce load depending on scale.
    scrapeInterval: "15s" # Prometheus scrapes targets every 15 seconds.  High-frequency scraping for quick dev feedback.
# This section configures Alertmanager, which receives alerts from Prometheus 
# and routes them to email, Slack, PagerDuty, or other receivers.
# Use case: you can test alerting in dev and validate alert routing before production.
alertmanager:
  enabled: true
  alertmanagerSpec:
    resources: # Use case: keep alerting available without over-allocating resources in a non-production cluster.
      requests:
        cpu: "50m" # enough for basic dev alert routing. Small footprint suitable for dev.
        memory: "128Mi" # enough for basic dev alert routing.
      limits: # Limits cap
        cpu: "200m"
        memory: "256Mi"
# This section configures Grafana, the dashboarding tool 
# used to visualize Prometheus metrics.
grafana:
  adminUser: "admin"
  adminPassword: "admin"     # dev only, Sets the initial Grafana admin username and password.
  # sidecar:
  #   dashboards:
  #     enabled: true
  #     label: grafana_dashboard
  #     #labelValue: "1"
  #     folder: /tmp/dashboards
  #     provider:
  #       foldersFromFilesStructure: true
  service:
    # Use case: safer default for dev because Grafana is not 
    # publicly exposed by default.
    # Exposes Grafana as a ClusterIP service. That means it 
    # is only reachable inside the Kubernetes cluster unless 
    # you use port-forwarding, ingress, or another exposure method.
    type: ClusterIP
  ingress:
    enabled: false # Disabled in dev baseline unless you want browser access.
  # Use case: RBAC is still the standard way to grant permissions, 
  # while PSP is disabled because it is deprecated/removed in modern 
  # Kubernetes setups.
  # RBAC in security stands for Role-Based Access Control. It is a way 
  # to control who can access systems, data, or actions by assigning 
  # permissions to roles instead of giving them individually to each person
  rbac: 
    create: true # means Grafana gets the Kubernetes RBAC objects it needs.
    pspEnabled: false # disables PodSecurityPolicy support.
  
  grafana.ini:
    auth:
      disable_login_form: false   # keep form login in dev, keep the login form enabled (you can later switch to true when SSO is fully configured and you want only SSO)
    users:
      viewers_can_edit: true      # allow experiments in dev, Grafana viewers cannot edit dashboards; only editors/admins can. This is key for “prod dashboards are read‑only for most people”
    dashboards:
      default_home_dashboard_path: /var/lib/grafana/dashboards/home.json # Sets the default home dashboard to a JSON file at that path. You’d typically ship that via a ConfigMap volume.
    security:
      allow_embedding: true # Allows embedding Grafana panels in iframes (e.g., internal portals, Confluence). Keep an eye on security/CSRF when using this

  # Add Loki datasource here
  additionalDataSources:
    - name: loki
      type: loki # declares this as a Loki datasource.
      access: proxy # means Grafana proxies queries to Loki from the server side, which is standard in Kubernetes.
      url: http://loki.logging.svc:3100 # must match the Loki service name/namespace; with helm upgrade --install loki ... -n logging the service will be loki.logging.svc:3100 by default
      isDefault: false
      jsonData:
        maxLines: 1000
        timeout: 60 # seconds; useful for large log queries

  dashboardProviders: # tells Grafana to load dashboards from files in given directories.
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: 'infra-dev' # provider name (internal).
          orgId: 1 # Grafana organization id (default org).
          folder: 'infra-dev' # Grafana folder where dashboards from this provider will appear (infra, myapp).
          type: file
          options:
            path: /var/lib/grafana/dashboards/infra # treat dashboards as JSON files on disk under those paths. The chart mounts ConfigMaps into /var/lib/grafana/dashboards/*, so this points to those
        - name: 'myapp-dev'
          orgId: 1
          folder: 'myapp-dev'
          type: file
          options:
            path: /var/lib/grafana/dashboards/myapp
  # It creates volumes from ConfigMaps named 
  # grafana-dashboards-infra and grafana-dashboards-myapp 
  # and mounts them into the paths referenced above.
  dashboardsConfigMaps:
    infra: grafana-dashboards-infra-dev
    myapp: grafana-dashboards-myapp-dev