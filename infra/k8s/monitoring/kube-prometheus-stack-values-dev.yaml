kubePrometheusStack:
  admissionWebhooks:
    enabled: true
    patch:
      enabled: false
      
global:
  environment: dev

crds:
  enabled: false

prometheusOperator:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

prometheus:
  image: prom/prometheus:v2.54.0
  storage:
    size: 5Gi        # 10Gi -> 5Gi for dev
  storageClassName: standard
  prometheusSpec:
    resources:
      requests:
        cpu: 100m    # 200m -> 100m
        memory: 384Mi  # 512Mi -> 384Mi
      limits:
        cpu: 500m    # 1000m -> 500m
        memory: 768Mi # 1Gi -> 768Mi
    retention: 7d    # 15d -> 7d is enough for dev
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    scrapeInterval: 30s  # 15s -> 30s to reduce load

alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        cpu: 25m      # 50m -> 25m
        memory: 64Mi  # 128Mi -> 64Mi
      limits:
        cpu: 150m     # 200m -> 150m
        memory: 128Mi # 256Mi -> 128Mi

grafana:
  enabled: true
  resources:
    requests:
      cpu: 50m       # add explicit small requests
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
    # Use your existing secret for admin credentials
  existingSecret: cluster-monitoring-infra-dev-grafana
  existingSecretPasswordKey: admin-password
  existingSecretUserKey: admin-user
  # security:
  #   adminUserSecret: cluster-monitoring-infra-dev-grafana
  #   adminUserKey: admin-user
  #   adminPasswordKey: admin-password
  storage:
    size: 2Gi        # 5Gi -> 2Gi for dev
  storageClassName: standard
  service:
    type: ClusterIP
  domain: grafana-dev.local
  ingress:
    enabled: true
    className: nginx
    tls: []          # no TLS for dev
  database:
    type: sqlite3
  rbac:
    create: true
    pspEnabled: false
  grafana.ini:
    auth:
      disable_login_form: false
    users:
      viewers_can_edit: true
    dashboards:
      default_home_dashboard_path: /var/lib/grafana/dashboards/home.json
    security:
      allow_embedding: true
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: infra-dev
          orgId: 1
          folder: infra-dev
          type: file
          options:
            path: /var/lib/grafana/dashboards/infra
        - name: myapp-dev
          orgId: 1
          folder: myapp-dev
          type: file
          options:
            path: /var/lib/grafana/dashboards/myapp
  dashboardsConfigMaps:
    infra: grafana-dashboards-infra-dev
    myapp: grafana-dashboards-myapp-dev