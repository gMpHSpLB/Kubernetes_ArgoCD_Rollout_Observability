global:
  environment: dev

crds:
  enabled: false

prometheusOperator:
  admissionWebhooks:
    enabled: false
    patch:
      enabled: false
  tls:
    enabled: false
  hostNetwork: false
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

prometheus:
  enabled: true
  # Do NOT override image here unless you really need to
  # image: prom/prometheus:v2.54.0
  prometheusSpec:
    resources:
      requests:
        cpu: 100m
        memory: 384Mi
      limits:
        cpu: 500m
        memory: 768Mi
    retention: 7d
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    scrapeInterval: 30s
    # Use emptyDir for dev:
    storageSpec: null
  # ADD THIS BLOCK (for init-config-reloader & config-reloader)
  configReloaderCpu: 50m
  configReloaderMemory: 100Mi
prometheus-node-exporter:
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 150m
        memory: 128Mi
    # Use emptyDir for dev:
    storage: {}

grafana:
  enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 768Mi
  sidecar:
    enabled: true
    resources:
      limits:
        cpu: 100m
        memory: 192Mi
      requests:
        cpu: 50m
        memory: 64Mi
      # Sidecar for datasources
  sidecarDatasources:
    resources:
      limits:
        cpu: 100m
        memory: 192Mi
      requests:
        cpu: 50m
        memory: 64Mi
  # Use your existing secret for admin credentials (optional)
  admin:
    existingSecret: cluster-monitoring-infra-dev-grafana
    userKey: admin-user
    passwordKey: admin-password

  # For dev: no PVC, use emptyDir
  persistence:
    enabled: false

  service:
    type: ClusterIP

  # For now, let’s not rely on ingress until core pods are healthy
  ingress:
    enabled: false

  database:
    type: sqlite3

  rbac:
    create: true
    pspEnabled: false

  grafana.ini:
    auth:
      disable_login_form: false
    users:
      viewers_can_edit: true
    dashboards:
      default_home_dashboard_path: /var/lib/grafana/dashboards/home.json
    security:
      allow_embedding: true

  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: infra-dev
          orgId: 1
          folder: infra-dev
          type: file
          options:
            path: /var/lib/grafana/dashboards/infra
        - name: myapp-dev
          orgId: 1
          folder: myapp-dev
          type: file
          options:
            path: /var/lib/grafana/dashboards/myapp

  dashboardsConfigMaps:
    infra: grafana-dashboards-infra-dev
    myapp: grafana-dashboards-myapp-dev