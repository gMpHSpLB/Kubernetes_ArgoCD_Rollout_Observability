---
global:
  environment: dev
crds:
  enabled: false
prometheusOperator:
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
prometheus:
  prometheusSpec:
    resources:
      requests:
        cpu: "200m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "1Gi"
    retention: 15d
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    scrapeInterval: "15s"
alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"
grafana:
  adminUser: admin
  adminPassword: admin
  service:
    type: ClusterIP
  ingress:
    enabled: false
  rbac:
    create: true
    pspEnabled: false
  grafana.ini:
    auth:
      disable_login_form: false
    users:
      viewers_can_edit: true
    dashboards:
      default_home_dashboard_path: /var/lib/grafana/dashboards/home.json
    security:
      allow_embedding: true
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: infra-dev
          orgId: 1
          folder: infra-dev
          type: file
          options:
            path: /var/lib/grafana/dashboards/infra
        - name: myapp-dev
          orgId: 1
          folder: myapp-dev
          type: file
          options:
            path: /var/lib/grafana/dashboards/myapp
  dashboardsConfigMaps:
    infra: grafana-dashboards-infra-dev
    myapp: grafana-dashboards-myapp-dev
