# These are plain Kubernetes ConfigMaps with labels so kube‑prometheus‑stack picks them up.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-infra-prod # must match dashboardsConfigMaps.infra from infra/k8s/monitoring/kube-prometheus-stack-values-prod.yaml
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
# Each key (home.json, k8s-overview.json) is a dashboard 
# file. Value is raw JSON (minified or compact is fine).
data:
  home.json: |
    { "id": null, "uid": "infra-home", "title": "Infra Home (prod)", "tags": ["infra","prod"], "timezone": "browser", "schemaVersion": 36, "version": 1, "panels": [], "time": { "from": "now-1h", "to": "now" } }
  k8s-overview.json: |
    { "id": null, "uid": "k8s-overview", "title": "Kubernetes Overview (prod)", "tags": ["infra","kubernetes","prod"], "timezone": "browser", "schemaVersion": 36, "version": 1, "panels": [], "time": { "from": "now-1h", "to": "now" } }