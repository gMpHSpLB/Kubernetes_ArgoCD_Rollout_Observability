# infra/k8s/monitoring/templates/alertmanager-config-staging.yaml
{{- if eq .Values.global.environment "staging" }}
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: kube-prometheus-stack-alertmanagerconfig
  namespace: monitoring
spec:
  # staging routes/receivers here
  route:
    receiver: default-receiver
    groupBy: ["alertname"]
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 12h

  receivers:
    - name: default-receiver
      emailConfigs:
        - to: "oncall@example.com"
          from: "alerts@example.com"
          smarthost: "smtp.example.com:587"
          authUsername: "alerts@example.com"
          authPassword:
            name: alertmanager-smtp-secret
            key: smtp_password
          requireTLS: true
          sendResolved: true
{{- end }}
