# infra/k8s/monitoring/templates/grafana-admin-secret-staging.yaml
{{- if eq .Values.global.environment "dev" }}
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin-credentials-dev
  namespace: monitoring
type: Opaque
data:
  admin-user: {{ "admin" | b64enc }}
  admin-password: {{ "admin" | b64enc }}
{{- end }}