{{- if eq .Values.global.environment "dev" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cluster-monitoring-infra-d-prometheus
  namespace: monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/instance: cluster-monitoring-infra-dev
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
      app.kubernetes.io/instance: cluster-monitoring-infra-dev
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus
        app.kubernetes.io/instance: cluster-monitoring-infra-dev
    spec:
      serviceAccountName: cluster-monitoring-infra-d-prometheus
      containers:
        - name: prometheus
          image: {{ .Values.prometheus.image | default "prom/prometheus:v2.54.0" }}
          imagePullPolicy: IfNotPresent
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/var/prometheus"
            - "--storage.tsdb.retention.time={{ .Values.prometheus.prometheusSpec.retention | default "15d" }}"
            - "--web.enable-lifecycle"
          lifecycle:
            preStop:
              exec:
                command:
                  - wget
                  - -q
                  - -O-
                  - --post-data=""
                  - http://localhost:9090/-/quit
          ports:
            - name: http
              containerPort: 9090
          resources:
{{ toYaml .Values.prometheus.prometheusSpec.resources | indent 12 }}
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus
            - name: prometheus-storage
              mountPath: /var/prometheus
      volumes:
        - name: prometheus-config
          configMap:
            name: cluster-monitoring-infra-d-prometheus-config
        - name: prometheus-storage
          persistentVolumeClaim:
            claimName: cluster-monitoring-infra-d-prometheus
{{- end }}