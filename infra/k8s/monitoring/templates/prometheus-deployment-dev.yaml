{{- if eq .Values.global.environment "dev" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cluster-monitoring-infra-d-prometheus
  namespace: monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/instance: cluster-monitoring-infra-dev
    app.kubernetes.io/component: prometheus
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
      app.kubernetes.io/instance: cluster-monitoring-infra-dev
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus
        app.kubernetes.io/instance: cluster-monitoring-infra-dev
    spec:
      serviceAccountName: cluster-monitoring-infra-d-prometheus
      containers:
        - name: prometheus
          image: {{ .Values.prometheus.image | default "prom/prometheus:v2.54.0" }}
          imagePullPolicy: IfNotPresent
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=7d
            - --web.enable-lifecycle
          ports:
            - name: http
              containerPort: 9090
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "4Gi"
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus
            - name: prometheus-storage
              mountPath: /prometheus
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
      volumes:
        - name: prometheus-config
          configMap:
            name: cluster-monitoring-infra-d-prometheus-config
        - name: prometheus-storage
          persistentVolumeClaim:
            claimName: cluster-monitoring-infra-d-prometheus
{{- end }}