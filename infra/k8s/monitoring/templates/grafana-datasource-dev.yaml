{{- if eq .Values.global.environment "dev" }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-monitoring-infra-d-grafana-datasource
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: cluster-monitoring-infra-dev
    app.kubernetes.io/component: datasource
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://cluster-monitoring-infra-d-prometheus.monitoring:9090
        isDefault: true
        jsonData:
          timeInterval: "30s"

      - name: Alertmanager
        type: alertmanager
        access: proxy
        url: http://cluster-monitoring-infra-d-alertmanager.monitoring:9093
        jsonData:
          implementation: "prometheus"

      - name: Loki
        type: loki
        access: proxy
        url: http://myapp-logging-dev-loki.logging:3100
        isDefault: false
        jsonData:
          maxLines: 1000
{{- end }}