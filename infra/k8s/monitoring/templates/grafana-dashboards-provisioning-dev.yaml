{{- if eq .Values.global.environment "dev" }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provisioning-dev
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: cluster-monitoring-infra-dev
    app.kubernetes.io/component: dashboards-provisioning
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: "infra-dev"
        folder: "Infra / Dev"
        type: file
        disableDeletion: true
        editable: false
        options:
          path: /var/lib/grafana/dashboards/infra

      - name: "myapp-dev"
        folder: "MyApp / Dev"
        type: file
        disableDeletion: true
        editable: false
        options:
          path: /var/lib/grafana/dashboards/myapp
{{- end }}