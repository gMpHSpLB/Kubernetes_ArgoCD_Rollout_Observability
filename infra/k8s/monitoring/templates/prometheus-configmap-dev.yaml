{{- if eq .Values.global.environment "dev" }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-monitoring-infra-d-prometheus-config
  namespace: monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/instance: cluster-monitoring-infra-dev
data:
  prometheus.yml: |
    global:
      scrape_interval: 30s
      evaluation_interval: 30s

    scrape_configs:
      # 1. Scrape Prometheus itself
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      # 2. Fixed: kubernetes-apiservers (proper auth for in-cluster)
      - job_name: 'kubernetes-apiservers'
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names:
                - default
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
            action: keep
            regex: kubernetes;https

      # 3. Fixed: kubernetes-nodes (scrape kubelet via API server proxy)
      - job_name: 'kubernetes-nodes'
        kubernetes_sd_configs:
          - role: node
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics
          - source_labels: [__meta_kubernetes_node_name]
            target_label: instance

      # 4. kubernetes-service-endpoints (only annotated services)
      - job_name: 'kubernetes-service-endpoints'
        kubernetes_sd_configs:
          - role: endpoints
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_port]
            action: replace
            target_label: __address__
            regex: (\d+)
            replacement: ${1}
          - action: labelmap
            regex: __meta_kubernetes_service_label_(.+)
      # 5. kubernetes-pods (excluding Loki; Loki has its own job below)
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          # Only scrape pods with prometheus.io/scrape: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          # Exclude Loki pods
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: drop
            regex: loki
          # Use prometheus.io/path if present
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          # Use prometheus.io/port if numeric
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            target_label: __address__
            regex: ([0-9]+)
            replacement: ${1}
          # Label map
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          # Namespace label
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          # Pod name label
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name
      # 6. Loki (explicit job, only port 3100)
      - job_name: 'loki'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          # Only scrape pods with app=loki
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: loki
          # Only scrape port 3100
          - source_labels: [__meta_kubernetes_pod_container_port_number]
            action: keep
            regex: "3100"
          # Set metrics path
          - target_label: __metrics_path__
            replacement: /metrics
          # Map namespace and pod name
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name      
{{- end }}