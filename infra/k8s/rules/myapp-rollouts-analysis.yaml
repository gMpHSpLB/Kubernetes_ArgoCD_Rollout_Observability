# Wire Prometheus analysis
# Add an AnalysisTemplate under your existing infra structure, for example:
# Use a ClusterAnalysisTemplate (shared across namespaces)
#   If you want the same template for dev, staging, and prod without duplicating, change 
#   the kind to ClusterAnalysisTemplate and remove namespace
apiVersion: argoproj.io/v1alpha1
kind: ClusterAnalysisTemplate
metadata:
  name: myapp-canary-analysis
spec:
  metrics:
    - name: http-error-rate
      interval: 60s
      successCondition: result[0] < 0.01
      failureCondition: result[0] >= 0.02
      provider:
        prometheus:
          address: http://cluster-monitoring-infra-d-prometheus.monitoring.svc.cluster.local:9090
          query: |
            sum(rate(http_requests_total{job="myapp-dev",status!~"2.."}[5m]))
              /
            sum(rate(http_requests_total{job="myapp-dev"}[5m]))
    - name: http-latency-p95
      interval: 60s
      successCondition: result[0] < 0.5
      failureCondition: result[0] >= 0.7
      provider:
        prometheus:
          address: http://cluster-monitoring-infra-d-prometheus.monitoring.svc.cluster.local:9090
          query: |
            histogram_quantile(0.95,
              sum(rate(http_request_duration_seconds_bucket{job="myapp-dev"}[5m])) by (le))