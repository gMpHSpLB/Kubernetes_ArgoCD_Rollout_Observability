# Wire Prometheus analysis (staging)
# Add an AnalysisTemplate under your existing infra structure, for example:
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: myapp-canary-analysis
  namespace: myapp-staging
spec:
  metrics:
    - name: http-error-rate
      interval: 60s
      successCondition: result[0] < 0.01
      failureCondition: result[0] >= 0.02
      provider:
        prometheus:
          # Adjust service name/namespace if your kube-prometheus-stack uses a different one
          address: http://kps-staging-kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
          query: |
            sum(rate(http_requests_total{job="myapp-staging",status!~"2.."}[5m]))
              /
            sum(rate(http_requests_total{job="myapp-staging"}[5m]))
    - name: http-latency-p95
      interval: 60s
      successCondition: result[0] < 0.5
      failureCondition: result[0] >= 0.7
      provider:
        prometheus:
          address: http://kps-staging-kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
          query: |
            histogram_quantile(0.95,
              sum(rate(http_request_duration_seconds_bucket{job="myapp-staging"}[5m])) by (le))