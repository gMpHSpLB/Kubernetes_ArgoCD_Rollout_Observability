---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: myapp-logging-environments
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - list:
        elements:
          - environment: dev
            namespace: logging
            autoSync: "true"
            targetRevision: main
          # - environment: staging
          #   namespace: logging
          #   autoSync: "true"
          #   targetRevision: main
          # - environment: prod
          #   namespace: logging
          #   autoSync: "false"
          #   targetRevision: main
  template:
    metadata:
      name: myapp-logging-{{.environment}}
      labels:
        app.kubernetes.io/part-of: myapp
        app.kubernetes.io/component: logging
        app.kubernetes.io/environment: "{{.environment}}"
    spec:
      project: default
      source:
        repoURL: https://github.com/gMpHSpLB/pythonworkspace.git
        targetRevision: "{{.targetRevision}}"
        path: infra/k8s/logging
        helm:
          valueFiles:
            - loki-stack-values-{{.environment}}.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.namespace}}"
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
  templatePatch: |
    {{- if eq .autoSync "true" }}
    spec:
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
    {{- end }}

