# This is an ArgoCD ApplicationSet manifest. 
# It automates the creation and management of ArgoCD 
# Application resources for your monitoring stack across 
# multiple environments (dev, staging, prod). Think of it as a "factory" that generates 3 separate ArgoCD Applications from a single template.
#
# What it does
#   - Creates 3 ArgoCD Applications: myapp-monitoring-dev, myapp-monitoring-staging, myapp-monitoring-prod
#   - Deploys monitoring resources (Prometheus, Grafana, etc.) from your Git repo's infra/k8s/monitoring path
#   - All deploy to the monitoring namespace with environment-specific behavior (auto-sync for dev/staging, manual for prod)
#
# Why use ApplicationSet?
#   - DRY principle: One manifest manages multiple environments instead of 3 separate Application manifests
#   - Environment promotion: Easy to update targetRevision across all envs (main → tag)
#   - GitOps automation: Centralized control of sync policies per environment.
# Result
# When applied, this creates 3 ArgoCD Applications:
# | Application              | Auto-sync | Behavior                  |
# | ------------------------ | --------- | ------------------------- |
# | myapp-monitoring-dev     | ✅ Yes     | Auto deploys + self-heals |
# | myapp-monitoring-staging | ✅ Yes     | Auto deploys + self-heals |
# | myapp-monitoring-prod    | ❌ No      | Manual sync only          |
#
#  - This assumes infra/k8s/monitoring already contains env‑agnostic 
#    configs or uses env‑specific values internally (as you do now).
#  - autoSync is a string in the generator; the template uses it to 
#    decide whether to enable automated (we’re using a Helm‑style 
#    conditional; if you use pure YAML here, you’d instead split 
#    into two ApplicationSets or accept automated for all envs).
# Prometheus and Grafana are covered by an ApplicationSet – they’re part of the “monitoring” stack, which we put into argocd-appset-monitoring.yaml. That ApplicationSet manages kube‑prometheus‑stack (Prometheus + Grafana + related CRDs) across dev/staging/prod, from your infra/k8s/monitoring directory.
#
# How they are included
# In the monitoring ApplicationSet:
#
# text
# source:
#   repoURL: git@github.com:gMpHSpLB/pythonworkspace.git
#   targetRevision: "{{targetRevision}}"
#   path: infra/k8s/monitoring
#
# Whatever you have under infra/k8s/monitoring 
# (your Helm release / values for kube‑prometheus‑stack, 
# Grafana ingress, Alertmanager, ServiceMonitors, etc.) is what ArgoCD will deploy.
# So:
#   - Prometheus components (operator, Prometheus, Alertmanager, rules, etc.) and
#   - Grafana (including ingress, dashboards, datasources)
#
# are all treated as one monitoring application per environment, 
# generated by that ApplicationSet:
#   - myapp-monitoring-dev
#   - myapp-monitoring-staging
#   - myapp-monitoring-prod
#
# We didn’t create a separate ApplicationSet just for Prometheus or just for Grafana because:
# - In real setups, kube‑prometheus‑stack is usually 
#   managed as a single “monitoring” unit per env.
# - Splitting Prometheus and Grafana into different 
#   apps adds complexity with no real gain for your use case right now.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet # Defines this as an ApplicationSet resource
metadata:
  name: myapp-monitoring-environments
  namespace: argocd
spec: # Metadata section - names it and places it in ArgoCD namespace.
  generators: # How to generate Applications
    - list:   # Static list generator (could also use git, cluster, etc.)
        elements: # Array of environment configs
          - environment: dev
            namespace: monitoring  # All envs use same namespace
            autoSync: "true"       # Auto-sync enabled
            targetRevision: main   # Deploys from main branch
          - environment: staging
            namespace: monitoring
            autoSync: "true"      # Auto-sync (comment suggests manual option). set to "false" if you prefer manual sync for staging
            targetRevision: main
          - environment: prod
            namespace: monitoring
            autoSync: "false"     # manual sync for prod, later you can set targetRevision to tag
            targetRevision: main  # Later change to git tag like v1.2.3
  template: # Blueprint for generated Applications. Generator section: Defines 3 environment configurations that become variables in the template.
    metadata:
      name: myapp-monitoring-{{environment}} # Generates: myapp-monitoring-dev, etc.
      labels: # Standard Kubernetes labels for organization
        app.kubernetes.io/part-of: myapp
        app.kubernetes.io/component: monitoring
        app.kubernetes.io/environment: "{{environment}}" # dev/staging/prod
    spec: # Application metadata template - uses {{environment}} variable from generator.
      project: default # ArgoCD project (permissions, repo access)
      source:  # Git source configuration, # Source spec - points to your Git repo path containing monitoring manifests.
        repoURL: git@github.com:gMpHSpLB/pythonworkspace.git
        targetRevision: "{{targetRevision}}" # main (from generator)
        path: infra/k8s/monitoring # K8s manifests/Helm charts live here
        # If you ever split values per env under infra/k8s/monitoring, you can also add Helm/Kustomize options here.
      destination: # Destination - where to deploy (same cluster, monitoring namespace).
        server: https://kubernetes.default.svc # In-cluster Kubernetes API
        namespace: "{{namespace}}" # monitoring (from generator)
      syncPolicy: # How ArgoCD manages deployments. Sync policy - uses Helm templating ({{- if }}) to enable auto-sync only when autoSync: "true".
        syncOptions:
          - CreateNamespace=true # Auto-creates monitoring namespace if missing
        automated:
{{- if eq .autoSync "true" }} # Helm templating! Conditional based on autoSync value
          prune: true  # Deletes resources removed from Git
          selfHeal: true # Auto-recovers drift from Git state
{{- end }}