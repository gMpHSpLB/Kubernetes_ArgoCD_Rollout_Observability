apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: promtail-infra-environments
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - list:
        elements:
          - environment: dev
            namespace: logging
            targetRevision: main
            valuesFile: "promtail-values-dev.yaml"
          # You can add staging/prod later:
          # - environment: staging
          #   namespace: logging
          #   targetRevision: main
          #   valuesFile: "promtail-values-staging.yaml"
  template:
    metadata:
      name: myapp-promtail-{{.environment}}
      labels:
        app.kubernetes.io/part-of: myapp
        app.kubernetes.io/component: promtail
        app.kubernetes.io/environment: "{{.environment}}"
    spec:
      project: default
      sources:
        # 1) Promtail Helm chart source
        - repoURL: https://grafana.github.io/helm-charts
          chart: promtail
          targetRevision: 6.15.5
          helm:
            releaseName: myapp-promtail-{{.environment}}
            parameters:
              - name: config.lokiAddress
                value: http://myapp-logging-dev-loki.logging.svc.cluster.local:3100/loki/api/v1/push

        # 2) Values-from-Git source so $values/... works (kept for completeness)
        - repoURL: https://github.com/gMpHSpLB/pythonworkspace.git
          targetRevision: main
          ref: values

      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.namespace}}"

      syncPolicy:
        syncOptions:
          - CreateNamespace=true
  templatePatch: |
    {{- if eq .environment "dev" }}
    spec:
      syncPolicy:
        automated: null
    {{- else }}
    spec:
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
    {{- end }}