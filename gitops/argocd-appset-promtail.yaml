apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: promtail-infra-environments
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - list:
        elements:
          - environment: dev
            namespace: logging
            targetRevision: main
            valuesFile: "promtail-values-dev.yaml"
  template:
    metadata:
      name: myapp-promtail-{{.environment}}
      labels:
        app.kubernetes.io/part-of: myapp
        app.kubernetes.io/component: promtail
        app.kubernetes.io/environment: "{{.environment}}"
    spec:
      project: default
      sources:
        - repoURL: https://grafana.github.io/helm-charts
          chart: promtail
          targetRevision: 6.15.5
          helm:
            releaseName: myapp-promtail-{{.environment}}
            valueFiles:
              - $values/{{.valuesFile}}

        - repoURL: https://github.com/gMpHSpLB/pythonworkspace.git
          targetRevision: main
          ref: values

      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.namespace}}"

      syncPolicy:
        syncOptions:
          - CreateNamespace=true
  templatePatch: |
    {{- if eq .environment "dev" }}
    spec:
      syncPolicy:
        automated: null
    {{- else }}
    spec:
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
    {{- end }}