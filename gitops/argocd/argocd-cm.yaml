apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
data:
  # Allow Argo CD to talk to the in-cluster API server (recommended for your setup).
  cluster.inClusterEnabled: "true"

  # Simple, known-good option so argocd-cm is not "empty".
  kustomize.buildOptions: "--load-restrictor LoadRestrictionsNone"

  # Exclude Prometheus CRDs from Argo CD management to avoid large-annotation issues.
  resource.exclusions: |
    - apiGroups:
        - apiextensions.k8s.io
      kinds:
        - CustomResourceDefinition
      clusters:
        - https://kubernetes.default.svc
      name: "*monitoring.coreos.com"

