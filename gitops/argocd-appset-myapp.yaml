---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: myapp-app-environments
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - list:
        elements:
          - environment: dev
            namespace: myapp-dev
            autoSync: "true"
            targetRevision: main
            myappValuesFile: "../../environments/dev/values-myapp.yaml"
          # - environment: staging
          #   namespace: myapp-staging
          #   autoSync: "true"
          #   targetRevision: main
          #   myappValuesFile: "../../environments/staging/values-myapp.yaml"
          # - environment: prod
          #   namespace: myapp-prod
          #   autoSync: "false"
          #   targetRevision: main
          #   myappValuesFile: "../../environments/prod/values-myapp.yaml"
  template:
    metadata:
      name: myapp-{{.environment}}
      labels:
        app.kubernetes.io/part-of: myapp
        app.kubernetes.io/component: application
        app.kubernetes.io/environment: "{{.environment}}"
    spec:
      project: default
      source:
        repoURL: https://github.com/gMpHSpLB/pythonworkspace.git
        targetRevision: "{{.targetRevision}}"
        path: charts/myapp
        helm:
          valueFiles:
            - "{{.myappValuesFile}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.namespace}}"
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
  templatePatch: |
    {{- if eq .autoSync "true" }}
    spec:
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
    {{- end }}
