---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-monitoring-infra-environments
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - list:
        elements:
          - environment: dev
            namespace: monitoring
            targetRevision: main
            valuesFile: "kube-prometheus-stack-values-dev.yaml"
          - environment: staging
            namespace: monitoring
            targetRevision: main
            valuesFile: "kube-prometheus-stack-values-staging.yaml"
          - environment: prod
            namespace: monitoring
            targetRevision: main
            valuesFile: "kube-prometheus-stack-values-prod.yaml"
  template:
    metadata:
      name: cluster-monitoring-infra-{{.environment}}
      labels:
        app.kubernetes.io/part-of: myapp
        app.kubernetes.io/component: cluster-monitoring
        app.kubernetes.io/environment: "{{.environment}}"
    spec:
      project: default
      source:
        repoURL: https://github.com/gMpHSpLB/pythonworkspace.git
        targetRevision: "{{.targetRevision}}"
        path: infra/k8s/monitoring
        helm:
          valueFiles:
            - "{{.valuesFile}}"
      destination:
        # If each Argo CD instance runs in its own cluster:
        server: https://kubernetes.default.svc
        namespace: "{{.namespace}}"
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
  templatePatch: |
    {{- if eq .environment "prod" }}
    spec:
      syncPolicy:
        automated: null
    {{- else }}
    spec:
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
    {{- end }}
