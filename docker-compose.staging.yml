services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydb
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d mydb"]
      interval: 5s
      timeout: 5s
      retries: 10

  myapp:
    image: ${IMAGE_MYAPP_STAGING} #will be provided by your deploy-staging job via environment variables from ci-cd.yml
    container_name: myapp-staging
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 5432
      ENV: staging
    ports:
      - "8000:8000"

  mylearning:
    image: ${IMAGE_MYLEARNING_STAGING} ##will be provided by your deploy-staging job via environment variables from ci-cd.yml
    container_name: mylearning-staging
    environment:
      ENV: staging