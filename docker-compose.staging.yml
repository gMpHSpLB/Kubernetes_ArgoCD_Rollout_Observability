#It overrides that sit on top of docker-compose-base.yml
services:
  myapp:
    container_name: myapp-staging
    volumes:
      - ./myapp:/app
    environment:
      APP_ENV: staging
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}

  mylearning:
    container_name: mylearning-staging
    volumes:
      - ./mylearning:/app
    environment:
      APP_ENV: staging

