# This file is the default configuration for a Helm chart 
# that deploys your app to Kubernetes. It does not run t
# the app by itself; instead, Helm uses these values to 
# fill in templates and generate the actual Kubernetes 
# manifests during install or upgrade.
#
# What this file does
#   values.yaml provides settings that the chart templates 
#   read through .Values. In practice, it lets you change 
#   things like replica count, container image, service 
#   type, resource limits, and environment variables without 
#   editing the template files themselves.
# Real use case
#   A common use case is deploying the same app to multiple
#   environments: dev, staging, and production. You keep the 
#   Kubernetes templates the same, but override values.yaml 
#   per environment so dev can use replicaCount: 1, a dev image tag, and a local tracing endpoint, while production can use more replicas, stricter resource limits, and real secret values.
#
# How Helm uses it
#   When you run Helm install or upgrade, Helm reads this 
#   file as the base configuration and injects the values 
#   into templates like deployment.yaml, service.yaml, 
#   ConfigMap templates, and Secret references. You can 
#   override parts of it with another values file or 
#   with --set on the command line, which is how teams 
#   keep one chart reusable across environments.
#
#Simple example
#   If the deployment template says something like 
#   replicas: {{ .Values.replicaCount }}, then changing 
#   replicaCount from 1 to 3 in values.yaml will make 
#   Kubernetes deploy three pods instead of one. The same 
#   idea applies to image tags, resource limits, and environment 
#   variables.
replicaCount: 1

image:
  fullName: ""      # e.g. ghcr.io/<reponame>/mylearning:dev (set via --set)
  repository: ""    # optional fallback
  tag: ""
  pullPolicy: IfNotPresent

resources:
  limits:
    cpu: "200m"
    memory: "256Mi"
  requests:
    cpu: "100m"
    memory: "128Mi"

# Non-secret config for mylearning
config:
  APP_ENV: "prod"
  LOG_LEVEL: "info"

# Secrets if mylearning ever needs DB or tokens
secret:
  name: mylearning-secret
  keys: []

extraEnv: []

tests: # job to runs pytest -m smoke.
  enabled: false

  smoke:
    enabled: false
    command:
      - python
      - -m
      - pytest
      - -m
      - smoke
      - -vv
      - --log-cli-level=INFO
      - --log-cli-format=%(asctime)s %(levelname)s [%(name)s] %(message)s

  full: # job to runs full pytest suite.
    enabled: false
    command:
      - python
      - -m
      - pytest
      - -vv
      - --log-cli-level=INFO
      - --log-cli-format=%(asctime)s %(levelname)s [%(name)s] %(message)s
      - --cov=exercises
      - --cov-report=term-missing
      - --cov-report=xml:coverage-mylearning.xml
      - --cov-fail-under=20

# add pod Non-root security Context
# These enforce non-root and limited capabilities at runtime, matching hardened container guidelines.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10002      # must match UID in your myapp Dockerfile
  runAsGroup: 10002
  fsGroup: 10002

# add container Non-root security Context
# These enforce non-root and limited capabilities at runtime, matching hardened container guidelines.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
