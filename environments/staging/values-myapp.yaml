# This file is the default configuration for a Helm chart
# that deploys your app to Kubernetes. It does not run t
# the app by itself; instead, Helm uses these values to
# fill in templates and generate the actual Kubernetes
# manifests during install or upgrade.
#
# What this file does
#   values.yaml provides settings that the chart templates
#   read through .Values. In practice, it lets you change
#   things like replica count, container image, service
#   type, resource limits, and environment variables without
#   editing the template files themselves.
# Real use case
#   A common use case is deploying the same app to multiple
#   environments: dev, staging, and production. You keep the
#   Kubernetes templates the same, but override values.yaml
#   per environment so dev can use replicaCount: 1, a dev image tag, and a local tracing endpoint, while production can use more replicas, stricter resource limits, and real secret values.
#
# How Helm uses it
#   When you run Helm install or upgrade, Helm reads this
#   file as the base configuration and injects the values
#   into templates like deployment.yaml, service.yaml,
#   ConfigMap templates, and Secret references. You can
#   override parts of it with another values file or
#   with --set on the command line, which is how teams
#   keep one chart reusable across environments.
#
#Simple example
#   If the deployment template says something like
#   replicas: {{ .Values.replicaCount }}, then changing
#   replicaCount from 1 to 3 in values.yaml will make
#   Kubernetes deploy three pods instead of one. The same
#   idea applies to image tags, resource limits, and environment
#   variables.
replicaCount: 2 # means the app should run as one pod by default.

# Note:
# you can avoid hard‑coding the repo path in your Helm
# values by using tpl + Values so CI can inject the full image
# name (or repo + tag)
image: # control which container image Kubernetes should run and how it should pull it.
  # If fullName is set, it overrides repository:tag
  fullName: ""      # e.g. ghcr.io/owner/repo/myapp:dev
  repository: ""    # optional fallback for local dev
  tag: ""
  pullPolicy: IfNotPresent

service:
  type: ClusterIP #  means the app is exposed only inside the cluster, not directly outside it.
  port: 8000 # is the port the service listens on and forwards to the app.

resources: # sets CPU and memory requests/limits so Kubernetes knows how much capacity the app needs and what maximum it may use
  limits:
    cpu: "1000m"
    memory: "1024Mi"
  requests:
    cpu: "500m"
    memory: "512Mi"

# Non-secret config; becomes a ConfigMap
# contains non-sensitive environment variables,
# which are typically turned into a ConfigMap.
config:
  APP_ENV: "staging"
  LOG_LEVEL: "info"
  OTEL_ENABLED: "true"
  OTEL_SERVICE_NAME: "myapp-staging"
  OTEL_EXPORTER_OTLP_ENDPOINT: "api.uptrace.dev:4317"
  DISABLE_CUSTOM_MIDDLEWARE: "false"
  OTEL_TRACES_SAMPLER : "always_on"

# Secret keys; values are provided via external Secret in cluster
# defines the names of secret-backed environment variables that
# should come from a Kubernetes Secret, not from plain text in the chart
secret:
  name: myapp-secret
  managedByHelm: false        # <--- key flag, means “do not render a Secret; assume it already exists in the cluster.”

# Optional extra env vars (non-secret) for experiments
# is a place to add optional environment variables later, usually for testing or experiments.
extraEnv: []

# Pod-level security context (UID/GID)
# add pod Non-root security Context
# These enforce non-root and limited capabilities at runtime, matching hardened container guidelines.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001      # must match UID in your myapp Dockerfile
  runAsGroup: 10001
  fsGroup: 10001

# add container Non-root security Context
# These enforce non-root and limited capabilities at runtime, matching hardened container guidelines.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

serviceMonitor:
  enabled: true

metrics:
  enabled: true

useArgoRollouts: false

rollouts:
  strategy: canary
  canary:
    steps:
      - setWeight: 10
      - pause:
          duration: 120
      - setWeight: 25
      - pause:
          duration: 120
      - setWeight: 50
      - pause:
          duration: 120
      - setWeight: 100
  analysis:
    enabled: true
    templateName: myapp-canary-analysis
